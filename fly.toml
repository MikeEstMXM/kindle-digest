app = "kindle-digest"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  APP_BASE_URL = "https://kindle-digest.fly.dev"
  DATABASE_PATH = "/data/kindle-digest.sqlite"

[mounts]
  source = "kindle_digest_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
